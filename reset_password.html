<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIÈRE | Wachtwoord Resetten</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .font-cinzel { font-family: 'Cinzel', serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="reset-container" class="glass p-12 w-96 rounded-3xl text-center">
        <h1 class="font-cinzel text-3xl mb-8">Wachtwoord Resetten</h1>
        <div id="reset-form">
            <input type="password" id="new-password" placeholder="Nieuw wachtwoord" class="w-full p-4 mb-4 bg-white/5 border border-white/10 rounded-xl focus:outline-none">
            <input type="password" id="confirm-password" placeholder="Bevestig wachtwoord" class="w-full p-4 mb-6 bg-white/5 border border-white/10 rounded-xl focus:outline-none">
            <button onclick="submitNewPassword()" class="w-full py-4 bg-white text-black font-bold uppercase">Reset Wachtwoord</button>
        </div>
        <div id="message-container" class="hidden">
            <p id="message-text"></p>
            <a href="/" class="mt-4 inline-block text-blue-400">Terug naar de homepagina</a>
        </div>
    </div>

    <script>
        function showMessage(text, isError = false) {
            document.getElementById('reset-form').classList.add('hidden');
            const msgContainer = document.getElementById('message-container');
            const msgText = document.getElementById('message-text');
            msgText.innerText = text;
            msgText.style.color = isError ? '#f87171' : '#34d399';
            msgContainer.classList.remove('hidden');
        }

        async function submitNewPassword() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                alert('De wachtwoorden komen niet overeen.');
                return;
            }

            const token = new URLSearchParams(window.location.search).get('token');

            const response = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password: newPassword })
            });

            const data = await response.json();
            showMessage(data.message || data.error, !response.ok);
        }
    </script>

</body>
</html>
